<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Processing Payment | PriceFinder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center bg-slate-100">

<div class="bg-white max-w-md w-full rounded-2xl shadow-xl p-8 text-center">

    <!-- Spinner -->
    <div class="flex justify-center mb-6">
        <div class="w-16 h-16 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin"></div>
    </div>

    <h1 class="text-2xl font-bold text-slate-800 mb-3">
        Processing Your Payment
    </h1>

    <p class="text-slate-600 text-sm leading-relaxed mb-6">
        Please wait while we securely redirect you to our payment partner.
        <br>
        <strong>Do not refresh or close this page.</strong>
    </p>

    <!-- Order Info -->
    <div class="bg-slate-50 rounded-xl p-4 text-left mb-6">
        <p class="text-sm text-slate-600">
            <strong>Order ID:</strong> {{ transaction_id }}
        </p>
        <p class="text-sm text-slate-600">
            <strong>Amount:</strong> ৳{{ amount }}
        </p>
    </div>

    <!-- CTA -->
    <button disabled
        class="w-full py-3 bg-blue-600 text-white font-semibold rounded-xl opacity-80 cursor-not-allowed">
        Redirecting to Secure Payment...
    </button>

    <p class="text-xs text-slate-400 mt-4">
        Powered by SSLCommerz Secure Gateway
    </p>

</div>

<!-- Auto Redirect -->
<script>
    setTimeout(function () {
        window.location.href = "{{ gateway_url }}";
    }, 2000); // 2 seconds delay
</script>

</body>
</html>
